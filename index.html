<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Ibrahim to India 🇮🇳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">India Explorer 🚩</div>
        </nav>
    </header>

    <section class="hero">
        <div class="overlay">
            <h1>Welcome to India, Ibrahim! 🇮🇳</h1>
            <p>Discover the Land of Diversity, Culture, and Wonders ✨</p>
            <button onclick="showAlert()">Explore Now 🐘</button>
        </div>
    </section>

    <section class="gallery">
        <h2>Experience the Magic 🕌</h2>
        <div class="pics-container">
            <div class="pic-card">
                <img src="https://images.unsplash.com" alt="Taj Mahal">
                <p>The Taj Mahal, Agra 🏛️</p>
            </div>
            <div class="pic-card">
                <img src="https://images.unsplash.com" alt="India Gate">
                <p>India Gate, Assam 🎖️</p>
            </div>
            <div class="pic-card">
                <img src="https://images.unsplash.com" alt="Varanasi">
                <p>Spiritual Varanasi 🕯️</p>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
